<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>报销单补件催办与归档工作台</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-left">
        <h1>📋 报销单补件催办与归档工作台</h1>
      </div>
      <div class="header-right">
        <div class="role-switcher">
          <label>当前角色：</label>
          <select id="roleSelect"></select>
        </div>
        <button class="btn btn-secondary" id="resetBtn" title="重置所有数据">重置数据</button>
      </div>
    </header>

    <div class="main">
      <aside class="sidebar">
        <div class="sidebar-title">单据状态</div>
        <nav class="status-nav" id="statusNav"></nav>
        <div class="sidebar-footer">
          <div class="stat-item">
            <span class="stat-label">待办总数</span>
            <span class="stat-value" id="todoCount">0</span>
          </div>
        </div>
      </aside>

      <section class="content">
        <div class="list-panel">
          <div class="panel-header">
            <div class="tab-switcher">
              <div class="tab-item active" data-tab="list">📋 报销单列表</div>
              <div class="tab-item" data-tab="tasks">⏰ 补件任务</div>
              <div class="tab-item" data-tab="budgets" id="budgetTab" style="display:none">💰 预算管理</div>
              <div class="tab-item" data-tab="acceptance" id="acceptanceTab" style="display:none">🧪 预算验收中心</div>
            </div>
            <button class="btn btn-primary" id="createBtn" style="display:none">+ 新建报销单</button>
            <button class="btn btn-primary" id="createBudgetBtn" style="display:none">+ 新建预算</button>
          </div>
          <div class="list-container" id="listContainer">
            <div class="empty-state">加载中...</div>
          </div>
          <div class="task-panel" id="taskPanel" style="display:none">
            <div class="task-toolbar">
              <div class="task-stats">
                <span class="task-stat">
                  <span class="task-stat-label">待补件</span>
                  <span class="task-stat-value" id="taskTotalCount">0</span>
                </span>
                <span class="task-stat overdue">
                  <span class="task-stat-label">已逾期</span>
                  <span class="task-stat-value" id="taskOverdueCount">0</span>
                </span>
              </div>
              <div class="task-actions">
                <button class="btn btn-warning btn-sm" id="batchRemindBtn" disabled>⏰ 批量催办</button>
              </div>
            </div>
            <div class="task-list" id="taskListContainer">
              <div class="empty-state">加载中...</div>
            </div>
          </div>
          <div class="budget-panel" id="budgetPanel" style="display:none">
            <div class="budget-filter">
              <div class="filter-item">
                <label>月份</label>
                <input type="month" id="budgetMonthFilter">
              </div>
              <div class="filter-item">
                <label>部门</label>
                <select id="budgetDeptFilter">
                  <option value="">全部</option>
                </select>
              </div>
              <div class="filter-item">
                <label>科目</label>
                <select id="budgetCategoryFilter">
                  <option value="">全部</option>
                </select>
              </div>
              <div class="filter-item filter-actions">
                <button class="btn btn-primary btn-sm" id="budgetSearchBtn">🔍 查询</button>
                <button class="btn btn-secondary btn-sm" id="budgetResetBtn">重置</button>
              </div>
            </div>
            <div class="budget-toolbar">
              <div class="budget-summary">
                <span class="summary-item">
                  <span class="summary-label">预算总额</span>
                  <span class="summary-value" id="budgetTotalAmount">¥0.00</span>
                </span>
                <span class="summary-item">
                  <span class="summary-label">已冻结</span>
                  <span class="summary-value frozen" id="budgetFrozenAmount">¥0.00</span>
                </span>
                <span class="summary-item">
                  <span class="summary-label">已扣减</span>
                  <span class="summary-value deducted" id="budgetDeductedAmount">¥0.00</span>
                </span>
                <span class="summary-item">
                  <span class="summary-label">可用余额</span>
                  <span class="summary-value available" id="budgetAvailableAmount">¥0.00</span>
                </span>
              </div>
              <div class="budget-actions">
                <button class="btn btn-success btn-sm" id="budgetImportBtn">📥 CSV导入</button>
                <button class="btn btn-primary btn-sm" id="budgetExportBtn">📤 预算导出</button>
                <button class="btn btn-info btn-sm" id="budgetTxExportBtn">📤 流水导出</button>
                <button class="btn btn-warning btn-sm" id="budgetReconcileBtn">🔄 预算对账</button>
              </div>
            </div>
            <div class="budget-list" id="budgetListContainer">
              <div class="empty-state">加载中...</div>
            </div>
          </div>
          <div class="acceptance-panel" id="acceptancePanel" style="display:none">
            <div class="acceptance-toolbar">
              <div class="acceptance-summary-cards">
                <div class="acc-card">
                  <div class="acc-card-label">配置覆盖率</div>
                  <div class="acc-card-value" id="accCoverageRate">--</div>
                  <div class="acc-card-sub" id="accCoverageSub">请执行检查</div>
                </div>
                <div class="acc-card">
                  <div class="acc-card-label">导入批次</div>
                  <div class="acc-card-value" id="accBatchCount">--</div>
                  <div class="acc-card-sub">本月成功导入批次</div>
                </div>
                <div class="acc-card">
                  <div class="acc-card-label">对账记录</div>
                  <div class="acc-card-value" id="accReconcileCount">--</div>
                  <div class="acc-card-sub">本月交易流水总数</div>
                </div>
                <div class="acc-card">
                  <div class="acc-card-label">验收场景</div>
                  <div class="acc-card-value" id="accScenarioCount">12</div>
                  <div class="acc-card-sub">内置自动化测试场景</div>
                </div>
              </div>
            </div>
            <div class="acceptance-actions">
              <button class="btn btn-primary" id="accCheckConfigBtn">📋 检查配置</button>
              <button class="btn btn-success" id="accAutoSetupBtn">🛠️ 自动补齐</button>
              <button class="btn btn-info" id="accRunAcceptanceBtn">▶️ 运行完整验收</button>
              <button class="btn btn-secondary" id="accViewReportBtn">📄 查看验收报告</button>
              <button class="btn btn-warning" id="accReconcileExportBtn" style="margin-left:auto">📤 导出对账</button>
            </div>

            <div class="acceptance-section" id="accConfigSection" style="display:none">
              <h3 class="section-title">📋 预算配置检查</h3>
              <div id="accConfigStatus" class="config-status"></div>
              <div id="accConfigMissing" class="config-missing"></div>
              <div id="accConfigZero" class="config-zero"></div>
            </div>

            <div class="acceptance-section">
              <h3 class="section-title">📥 导入批次记录</h3>
              <div class="import-batches-list" id="accBatchList">
                <div class="empty-state">暂无导入批次</div>
              </div>
            </div>

            <div class="acceptance-section">
              <h3 class="section-title">📊 四类导入明细示例</h3>
              <div class="import-details-tabs">
                <button class="tab-btn active" data-detail-tab="success">✅ 成功 <span id="cntSuccess">0</span></button>
                <button class="tab-btn" data-detail-tab="skipped">⏭️ 跳过 <span id="cntSkipped">0</span></button>
                <button class="tab-btn" data-detail-tab="rejected">🚫 拒绝覆盖 <span id="cntRejected">0</span></button>
                <button class="tab-btn" data-detail-tab="failed">❌ 失败 <span id="cntFailed">0</span></button>
              </div>
              <div class="import-details-content" id="accImportDetails">
                <div class="empty-state">请先执行验收脚本或导入预算以查看明细</div>
              </div>
            </div>

            <div class="acceptance-section">
              <h3 class="section-title">🔍 操作日志与预算流水一致性</h3>
              <div class="consistency-check">
                <div class="consistency-input">
                  <input type="text" id="accConsistencyId" placeholder="请输入报销单ID 如 BX1001">
                  <button class="btn btn-primary btn-sm" id="accCheckConsistencyBtn">检查一致性</button>
                </div>
                <div id="accConsistencyResult" class="consistency-result"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="detail-panel" id="detailPanel">
          <div class="empty-state">
            <div style="font-size:48px;margin-bottom:16px">📄</div>
            <p>请选择左侧报销单查看详情</p>
          </div>
        </div>
      </section>
    </div>
  </div>

  <div class="modal" id="modal" style="display:none">
    <div class="modal-mask"></div>
    <div class="modal-dialog">
      <div class="modal-header">
        <h3 id="modalTitle">标题</h3>
        <button class="modal-close" id="modalClose">×</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <div class="toast" id="toast" style="display:none"></div>

  <script src="app.js"></script>
</body>
</html>
